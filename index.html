<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ankit ❤️ Ankita</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
    overflow: hidden;
}

/* Layout */
.main {
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: space-around;
    padding: 20px;
}

/* Left Image */
.left img {
    width: 280px;
    height: 350px;
    border-radius: 20px;
    border: 5px solid white;
    object-fit: cover;
    animation: floatImg 3s ease-in-out infinite;
}

/* Floating image animation */
@keyframes floatImg {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* Right Content */
.right {
    max-width: 400px;
}

/* Title */
h1 {
    font-size: 2.5rem;
    text-shadow: 0 0 10px white, 0 0 20px pink;
}

/* Typing */
#typing {
    font-size: 20px;
    margin-top: 10px;
}

/* Buttons */
button {
    padding: 12px 20px;
    margin-top: 15px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
}

/* Surprise */
#surprise {
    display: none;
    margin-top: 15px;
}

/* Floating hearts */
.hearts span {
    position: absolute;
    bottom: -50px;
    font-size: 20px;
    animation: float 8s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Counter */
#counter {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- Floating hearts -->
<div class="hearts">
    <span>❤️</span>
    <span>💖</span>
    <span>💕</span>
    <span>💘</span>
    <span>❤️</span>
    <span>💖</span>
</div>

<div class="main">

    <!-- Left Side -->
    <div class="left">
        <img src="ankita.jpg" alt="Ankita">
    </div>

    <!-- Right Side -->
    <div class="right">
        <h1>Ankit ❤️ Ankita</h1>

        <div id="typing"></div>

        <p id="counter"></p>

        <button onclick="showSurprise()">Open Surprise 🎁</button>

        <div id="surprise">
            <p>
                Meri shuggi… tu meri aadat ban chuki hai ❤️<br>
                Babu, jab tu hasta hai na… sab perfect lagta hai 😊<br>
                Meri sona… tu hi meri duniya hai 💞
            </p>

            <button onclick="loveQuestion()">Stay Forever? 💍</button>
            <p id="answer"></p>
        </div>
    </div>

</div>

<!-- Music -->
<audio id="music" loop>
    <source src="love.mp3" type="audio/mpeg">
</audio>

<script>

// Typing
const text = "I Love You meri Shugiiiiii ❤️";
let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 80);
    }
}
typeWriter();

// Music
const music = document.getElementById("music");

// Fade in
function fadeIn(audio) {
    audio.volume = 0;
    let vol = 0;
    const fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            audio.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 200);
}

// Show Surprise
function showSurprise() {
    document.getElementById("surprise").style.display = "block";

    music.currentTime = 50;
    music.play();
    fadeIn(music);
}

// Love button
function loveQuestion() {
    document.getElementById("answer").innerText =
        "Hamesha ❤️ (No option 😄)";
}

// Counter
const startDate = new Date("2026-02-25");
setInterval(() => {
    const now = new Date();
    const diff = now - startDate;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));

    document.getElementById("counter").innerText =
        "Together for " + days + " days ❤️";
}, 1000);

</script>

</body>
</html>
